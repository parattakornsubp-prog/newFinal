name: CI/CD — Test & Deploy to Hugging Face Spaces

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Run Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

  # ─────────────────────────────────────────────
  # Job 2: Deploy to Hugging Face Spaces
  # Only runs when ALL tests pass on push to main
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: test  # Only deploy if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: |
          git lfs install

      - name: Push to Hugging Face Spaces via API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Install huggingface_hub CLI
          pip install huggingface_hub

          # Upload all project files to HF Space
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          username = os.environ["HF_USERNAME"]
          space_name = os.environ["HF_SPACE_NAME"]
          repo_id = f"{username}/{space_name}"

          # Upload source code (excluding .git, __pycache__, etc.)
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=["*.git*", "__pycache__", "*.pyc", ".github"],
          )
          print(f"✅ Deployed to https://huggingface.co/spaces/{repo_id}")
          EOF
